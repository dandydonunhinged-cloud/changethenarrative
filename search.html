<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Your Race | Change The Narrative</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #fff; font-size: 2em; margin-bottom: 8px; }
        h1 span { color: #58a6ff; }
        .subtitle { color: #8b949e; margin-bottom: 32px; }
        .back { margin-bottom: 20px; font-size: 0.9em; }
        .back a { color: #58a6ff; text-decoration: none; }
        .filters { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
        .filters select, .filters input {
            background: #161b22; border: 1px solid #30363d; color: #c9d1d9; padding: 10px 14px;
            border-radius: 6px; font-size: 0.9em; min-width: 200px;
        }
        .filters select:focus, .filters input:focus { border-color: #58a6ff; outline: none; }
        table { width: 100%; border-collapse: collapse; }
        th { padding: 12px; text-align: left; color: #58a6ff; font-size: 0.8em; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #30363d; cursor: pointer; }
        th:hover { color: #79b8ff; }
        td { padding: 10px 12px; font-size: 0.9em; border-bottom: 1px solid #21262d; }
        .candidate { color: #fff; font-weight: 600; }
        .tossup { color: #e3b341; }
        .lean-r { color: #f0883e; }
        .solid-r { color: #da3633; }
        .lean-d { color: #58a6ff; }
        .link a { color: #58a6ff; text-decoration: none; }
        .link a:hover { text-decoration: underline; }
        tr.hidden { display: none; }
        .count { color: #8b949e; font-size: 0.85em; margin-bottom: 16px; }
        .footer { margin-top: 40px; text-align: center; font-size: 0.8em; color: #484f58; }
    </style>
</head>
<body>
<div class="container">
    <div class="back"><a href="/">&larr; Back to Change The Narrative</a></div>
    <h1>Our <span>Work</span></h1>
    <div class="subtitle">Every race we've analyzed. Search by state, candidate, or level.</div>

    <div class="filters">
        <select id="stateFilter">
            <option value="">All States</option>
        </select>
        <select id="levelFilter">
            <option value="">All Levels</option>
            <option value="US Senate">US Senate</option>
            <option value="US House">US House</option>
            <option value="State Senate">State Senate</option>
            <option value="State House">State House</option>
            <option value="Governor">Governor</option>
        </select>
        <input type="text" id="searchBox" placeholder="Search candidate or opponent...">
    </div>
    <div class="count" id="resultCount"></div>

    <table>
        <thead>
            <tr>
                <th onclick="sortTable(0)">State</th>
                <th onclick="sortTable(1)">Level</th>
                <th onclick="sortTable(2)">Candidate</th>
                <th onclick="sortTable(3)">Opponent</th>
                <th onclick="sortTable(4)">Rating</th>
                <th>Analysis</th>
            </tr>
        </thead>
        <tbody id="raceTable">
        </tbody>
    </table>

    <div class="footer">
        <p>Powered by RPCCP | <a href="mailto:don@dandydon.media" style="color:#58a6ff;">don@dandydon.media</a> | (409) 332-9313</p>
    </div>
</div>

<script>
const races = [
    // US Senate
    {state:"Texas", level:"US Senate", candidate:"James Talarico", opponent:"Cornyn/Paxton", rating:"Lean R", ratingClass:"lean-r", link:"campaigns/tx.html"},
    {state:"Maine", level:"US Senate", candidate:"Graham Platner", opponent:"Susan Collins", rating:"Toss-up", ratingClass:"tossup", link:"campaigns/me.html"},
    {state:"North Carolina", level:"US Senate", candidate:"Roy Cooper", opponent:"Michael Whatley", rating:"Toss-up", ratingClass:"tossup", link:"campaigns/nc.html"},
    {state:"Alaska", level:"US Senate", candidate:"Mary Peltola", opponent:"Dan Sullivan", rating:"Lean R", ratingClass:"lean-r", link:"campaigns/ak.html"},
    {state:"Ohio", level:"US Senate", candidate:"Sherrod Brown", opponent:"Jon Husted", rating:"Lean R", ratingClass:"lean-r", link:"campaigns/oh.html"},
    {state:"Iowa", level:"US Senate", candidate:"Josh Turek", opponent:"Ashley Hinson", rating:"Lean R", ratingClass:"lean-r", link:"campaigns/ia.html"},
    {state:"Georgia", level:"US Senate", candidate:"Jon Ossoff", opponent:"TBD (GOP primary)", rating:"Toss-up", ratingClass:"tossup", link:"campaigns/ga.html"},
    {state:"Michigan", level:"US Senate", candidate:"Mallory McMorrow", opponent:"Mike Rogers", rating:"Toss-up", ratingClass:"tossup", link:"campaigns/mi.html"},
    {state:"Mississippi", level:"US Senate", candidate:"Scott Colom", opponent:"Cindy Hyde-Smith", rating:"Solid R", ratingClass:"solid-r", link:"campaigns/ms.html"},

    // State Legislature — from Specter's battleground matrix
    {state:"Wisconsin", level:"State Senate", candidate:"Flip Target (2 seats)", opponent:"R 18-15", rating:"Competitive", ratingClass:"tossup", link:""},
    {state:"Wisconsin", level:"State House", candidate:"Flip Target (5 seats)", opponent:"R 54-45", rating:"Competitive", ratingClass:"tossup", link:""},
    {state:"Arizona", level:"State Senate", candidate:"Flip Target (3 seats)", opponent:"R 17-13", rating:"Competitive", ratingClass:"tossup", link:""},
    {state:"Arizona", level:"State House", candidate:"Flip Target (4 seats)", opponent:"R 33-27", rating:"Competitive", ratingClass:"tossup", link:""},
    {state:"Michigan", level:"State House", candidate:"Flip Target (4 seats)", opponent:"R 58-52", rating:"Toss-up", ratingClass:"tossup", link:""},
    {state:"Pennsylvania", level:"State Senate", candidate:"Flip Target (3 seats)", opponent:"R 27-23", rating:"Competitive", ratingClass:"tossup", link:""},
    {state:"Pennsylvania", level:"State House", candidate:"DEFEND (1 seat margin)", opponent:"D 102-101", rating:"Must Hold", ratingClass:"lean-d", link:""},
    {state:"Minnesota", level:"State House", candidate:"TIED — 1 seat to flip", opponent:"67-67 TIE", rating:"Toss-up", ratingClass:"tossup", link:""},
    {state:"Minnesota", level:"State Senate", candidate:"DEFEND (1 seat margin)", opponent:"DFL 34-33", rating:"Must Hold", ratingClass:"lean-d", link:""},
    {state:"New Hampshire", level:"State House", candidate:"Flip Target (~23 seats)", opponent:"R 214-178", rating:"Toss-up", ratingClass:"tossup", link:""},
    {state:"Georgia", level:"State House", candidate:"Flip Target (8-10 seats)", opponent:"R 99-81", rating:"Competitive", ratingClass:"tossup", link:""},
    {state:"North Carolina", level:"State Senate", candidate:"Break Supermajority (1 seat)", opponent:"R 30 (threshold)", rating:"High ROI", ratingClass:"lean-d", link:""},

    // Governor
    {state:"Iowa", level:"Governor", candidate:"Open Seat", opponent:"Reynolds term-limited", rating:"Competitive", ratingClass:"tossup", link:""},
    {state:"Kansas", level:"Governor", candidate:"DEFEND — Kelly (D) open", opponent:"Must hold", rating:"Must Hold", ratingClass:"lean-d", link:""},
    {state:"Ohio", level:"Governor", candidate:"Open Seat", opponent:"DeWine term-limited", rating:"Competitive", ratingClass:"tossup", link:""},
    {state:"Nevada", level:"Governor", candidate:"Challenge Lombardo (R)", opponent:"Lombardo", rating:"Toss-up", ratingClass:"tossup", link:""},
];

// Populate state filter
const states = [...new Set(races.map(r => r.state))].sort();
const stateSelect = document.getElementById('stateFilter');
states.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s;
    stateSelect.appendChild(opt);
});

function renderTable() {
    const stateVal = document.getElementById('stateFilter').value;
    const levelVal = document.getElementById('levelFilter').value;
    const searchVal = document.getElementById('searchBox').value.toLowerCase();

    const tbody = document.getElementById('raceTable');
    tbody.innerHTML = '';
    let count = 0;

    races.forEach(r => {
        if (stateVal && r.state !== stateVal) return;
        if (levelVal && r.level !== levelVal) return;
        if (searchVal && !r.candidate.toLowerCase().includes(searchVal) && !r.opponent.toLowerCase().includes(searchVal) && !r.state.toLowerCase().includes(searchVal)) return;

        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${r.state}</td>
            <td>${r.level}</td>
            <td class="candidate">${r.candidate}</td>
            <td style="color:#8b949e;">${r.opponent}</td>
            <td class="${r.ratingClass}">${r.rating}</td>
            <td class="link">${r.link ? `<a href="${r.link}">View &rarr;</a>` : '<span style="color:#484f58;">Coming soon</span>'}</td>
        `;
        tbody.appendChild(tr);
        count++;
    });

    document.getElementById('resultCount').textContent = `Showing ${count} of ${races.length} races`;
}

document.getElementById('stateFilter').addEventListener('change', renderTable);
document.getElementById('levelFilter').addEventListener('change', renderTable);
document.getElementById('searchBox').addEventListener('input', renderTable);

function sortTable(col) {
    races.sort((a, b) => {
        const keys = ['state','level','candidate','opponent','rating'];
        return a[keys[col]].localeCompare(b[keys[col]]);
    });
    renderTable();
}

renderTable();
</script>
</body>
</html>
